apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-two
  namespace: argocd
  labels:
    app: nginx-two
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-two
  template:
    metadata:
      labels:
        app: nginx-two
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-two
  namespace: argocd
  labels:
    app: nginx-two
spec:
  type: ClusterIP
  selector:
    app: nginx-two
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
