apiVersion: apps/v1
kind: Deployment
metadata:
  name: openui
  namespace: argocd
  labels:
    app: openui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openui
  template:
    metadata:
      labels:
        app: openui
    spec:
      containers:
        - name: openui
          image: ghcr.io/wandb/openui:latest
          ports:
            - containerPort: 7878
          env:
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: openui
  namespace: argocd
  labels:
    app: openui
spec:
  type: ClusterIP
  selector:
    app: openui
  ports:
    - port: 7878
      targetPort: 7878
      protocol: TCP
