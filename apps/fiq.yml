apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fiq
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sofiengwin/fiq.git
    targetRevision: HEAD
    path: .chart
    helm:
      parameters:
        - name: image.tag
          value: "latest"
        - name: replicaCount
          value: "1"
        - name: env.RAILS_ENV
          value: "production"
        - name: env.RACK_ENV
          value: "production"
        - name: env.RAILS_LOG_TO_STDOUT
          value: "true"
        - name: env.RAILS_SERVE_STATIC_FILES
          value: "true"
        - name: env.DB_HOST
          value: "postgresql"
        - name: env.POSTGRES_USER
          value: "postgres"
        - name: env.POSTGRES_PASSWORD
          value: "postgres"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd